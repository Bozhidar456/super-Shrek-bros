<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shrek Bros - Gravity Fixed</title>
    <style>
        body {
            margin: 0; background-color: #222; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; font-family: 'Courier New', Courier, monospace; color: white;
            overflow: hidden; touch-action: none; 
        }
        #hud {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 800px; padding: 0 10px; box-sizing: border-box;
            font-size: 20px; color: #C4D300; font-weight: bold; margin-bottom: 5px;
        }
        .hud-item { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 10px; border: 2px solid #555; }
        canvas {
            background-color: #5C94FC; border: 4px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            image-rendering: pixelated; width: 100%; max-width: 800px; aspect-ratio: 16 / 9; cursor: pointer;
        }
        #touchControls {
            display: flex; justify-content: space-between;
            width: 100%; max-width: 800px; padding: 15px 20px; box-sizing: border-box; user-select: none;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.2); border: 2px solid #C4D300;
            border-radius: 10px; padding: 15px 25px; font-size: 24px; font-weight: bold; color: white;
        }
        .touch-btn:active { background: rgba(196, 211, 0, 0.6); }
        .dir-btns { display: flex; gap: 15px; }
    </style>
    <link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Играта е готова за работа офлайн!"))
      .catch(err => console.log("Грешка при регистрация:", err));
  }
</script>
</head>
<body>

    <div id="hud">
        <div id="scoreBoard" class="hud-item">Дистанция: 0m</div>
        <div id="coinBoard" class="hud-item">🪙 0</div>
    </div>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    
    <div id="touchControls">
        <div class="dir-btns">
            <div class="touch-btn" id="btnLeft">⬅️</div>
            <div class="touch-btn" id="btnRight">➡️</div>
        </div>
        <div class="touch-btn" id="btnJump">⬆️ СКОК</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreBoard');
        const coinEl = document.getElementById('coinBoard');

        const assets = { shrek: new Image(), enemy: new Image(), box: new Image(), pipe: new Image(), coin: new Image() };
        assets.shrek.src = 'shrek.png';
        assets.enemy.src = 'protivnic1.png'; 
        assets.box.src = 'box.png';         
        assets.pipe.src = 'truba.png';      
        assets.coin.src = 'coin.png';

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Enter' && gameOver) startGame();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        const handleRestart = (e) => { if (gameOver) { e.preventDefault(); startGame(); } };
        canvas.addEventListener('mousedown', handleRestart);
        canvas.addEventListener('touchstart', handleRestart);

        const addTouch = (id, code) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
        };
        addTouch('btnLeft', 'KeyA'); addTouch('btnRight', 'KeyD'); addTouch('btnJump', 'Space');

        let cameraX = 0, score = 0, coinsCount = 0, lastGeneratedX = 0, gameOver = false;
        let blocks = [], enemies = [], activeCoins = [], player = {};
        const gravity = 0.7, friction = 0.85, GROUND_Y = 400;

        function startGame() {
            blocks = []; enemies = []; activeCoins = [];
            cameraX = 0; score = 0; coinsCount = 0; lastGeneratedX = -100; 
            gameOver = false;
            coinEl.innerText = `🪙 0`;

            player = {
                x: 100, y: 100, width: 60, height: 60,
                vx: 0, vy: 0, speed: 1.0, maxSpeed: 6.0, 
                jumpPower: -15, grounded: false 
            };
            generateGround(800);
        }

        function generateGround(length) {
            blocks.push({ x: lastGeneratedX, y: GROUND_Y, w: length, h: 60, type: 'ground' });
            lastGeneratedX += length;
        }

        function generateSection() {
            const rand = Math.random();
            if (rand < 0.4) { 
                const segmentLen = 200 + Math.random() * 200; 
                if (Math.random() > 0.4) {
                    // Генерираме враг със собствено vy (вертикална скорост)
                    enemies.push({ x: lastGeneratedX + 100, y: GROUND_Y - 50, w: 40, h: 40, vx: -2.2, vy: 0, dead: false });
                }
                generateGround(segmentLen);
            } else if (rand < 0.7) {
                lastGeneratedX += (130 + Math.random() * 100);
                generateGround(150); 
            } else {
                generateGround(80);
                const pipeH = 60 + Math.random() * 90;
                blocks.push({ x: lastGeneratedX, y: GROUND_Y - pipeH, w: 70, h: pipeH, type: 'pipe' });
                lastGeneratedX += 70;
                generateGround(150);
            }
            if(Math.random() > 0.6) {
                const bx = lastGeneratedX - 120;
                blocks.push({ x: bx, y: GROUND_Y - 150, w: 45, h: 45, type: 'box', hit: false });
            }
        }

        function update() {
            if (gameOver) return;

            if (cameraX + canvas.width > lastGeneratedX - 400) generateSection();

            // Филтриране на изчезнали обекти
            blocks = blocks.filter(b => b.x + b.w > cameraX - 100);
            enemies = enemies.filter(e => e.x + e.w > cameraX - 100 && !e.shouldRemove);

            // Монети анимация
            for (let i = activeCoins.length - 1; i >= 0; i--) {
                let c = activeCoins[i]; c.y += c.vy; c.vy += gravity; c.alpha -= 0.03;
                if (c.alpha <= 0) activeCoins.splice(i, 1);
            }

            // Плейър физика
            if (keys['KeyD'] || keys['ArrowRight']) player.vx += player.speed;
            if (keys['KeyA'] || keys['ArrowLeft']) player.vx -= player.speed;
            player.vx *= friction;
            player.vy += gravity;

            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            player.x += player.vx;
            if (player.x > cameraX + canvas.width / 3) cameraX = player.x - canvas.width / 3;
            if (player.x < cameraX) { player.x = cameraX; player.vx = 0; }
            player.y += player.vy;

            // Колизии Плейър
            player.grounded = false;
            for (let b of blocks) {
                if (player.x < b.x + b.w && player.x + player.width > b.x &&
                    player.y < b.y + b.h && player.y + player.height > b.y) {
                    if (player.vy > 0 && (player.y + player.height - player.vy) <= b.y + 15) {
                        player.y = b.y - player.height; player.vy = 0; player.grounded = true;
                    } else if (player.vy < 0 && (player.y - player.vy) >= b.y + b.h - 15) {
                        player.y = b.y + b.h; player.vy = 0;
                        if (b.type === 'box' && !b.hit) {
                            b.hit = true; coinsCount++; coinEl.innerText = `🪙 ${coinsCount}`;
                            activeCoins.push({ x: b.x + 5, y: b.y - 30, w: 35, h: 35, vy: -8, alpha: 1 });
                        }
                    } else {
                        if (player.vx > 0) { player.x = b.x - player.width; player.vx = 0; }
                        else if (player.vx < 0) { player.x = b.x + b.w; player.vx = 0; }
                    }
                }
            }

            // --- ФИЗИКА НА ВРАГОВЕТЕ (FIXED) ---
            for (let e of enemies) {
                if (e.dead) continue;

                e.vy += gravity; // Врагът винаги усеща гравитация
                e.y += e.vy;
                e.x += e.vx;

                let enemyOnGround = false;
                for (let b of blocks) {
                    if (e.x < b.x + b.w && e.x + e.w > b.x &&
                        e.y < b.y + b.h && e.y + e.h > b.y) {
                        
                        // Сблъсък с горната част на блок (стъпване)
                        if (e.vy > 0 && (e.y + e.h - e.vy) <= b.y + 10) {
                            e.y = b.y - e.h;
                            e.vy = 0;
                            enemyOnGround = true;
                        } 
                        // Сблъсък със стена (тръба или кутия) - обръщане
                        else if (b.type === 'pipe' || b.type === 'box') {
                            e.vx *= -1;
                            if (e.vx > 0) e.x = b.x + b.w; else e.x = b.x - e.w;
                        }
                    }
                }

                // Ако падне под екрана
                if (e.y > canvas.height) e.shouldRemove = true;

                // Сблъсък с Шрек
                if (player.x < e.x + e.w && player.x + player.width > e.x &&
                    player.y < e.y + e.h && player.y + player.height > e.y) {
                    if (player.vy > 0 && player.y + player.height < e.y + 25) {
                        e.dead = true; player.vy = -12; 
                    } else { gameOver = true; }
                }
            }

            score = Math.floor(player.x / 10);
            scoreEl.innerText = `Дистанция: ${score}m`;
            if (player.y > canvas.height + 100) gameOver = true;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-Math.floor(cameraX), 0); 

            for (let b of blocks) {
                if (b.type === 'ground') { ctx.fillStyle = '#C84C0C'; ctx.fillRect(b.x, b.y, b.w, b.h); }
                else if (b.type === 'box') {
                    ctx.save(); if (b.hit) ctx.globalAlpha = 0.4;
                    if (assets.box.complete) ctx.drawImage(assets.box, b.x, b.y, b.w, b.h);
                    ctx.restore();
                } else if (b.type === 'pipe') {
                    if (assets.pipe.complete) ctx.drawImage(assets.pipe, b.x, b.y, b.w, b.h);
                }
            }
            for (let c of activeCoins) {
                ctx.save(); ctx.globalAlpha = c.alpha;
                if (assets.coin.complete) ctx.drawImage(assets.coin, c.x, c.y, c.w, c.h);
                ctx.restore();
            }
            for (let e of enemies) {
                if (!e.dead && assets.enemy.complete) ctx.drawImage(assets.enemy, e.x, e.y, e.w, e.h);
            }
            if (assets.shrek.complete) ctx.drawImage(assets.shrek, player.x, player.y, player.width, player.height);
            ctx.restore();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#C4D300'; ctx.font = 'bold 35px Arial'; ctx.textAlign = 'center';
                ctx.fillText('ГЕЙМ ОВЪР', canvas.width/2, 180);
                ctx.fillStyle = 'white'; ctx.font = '22px Arial';
                ctx.fillText(`Дистанция: ${score}m | Монети: ${coinsCount}`, canvas.width/2, 230);
                ctx.font = '18px Arial';
                ctx.fillText('Кликни или натисни ENTER за рестарт', canvas.width/2, 280);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        startGame(); gameLoop();
    </script>
</body>
</html>
